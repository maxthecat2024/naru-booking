name: Build Mobile Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm ci

      # Patch the ExpoModulesCorePlugin to avoid 'release' SoftwareComponent error
      - name: Patch Expo Gradle plugin
        run: |
          PLUGIN="node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle"
          sed -i 's/from components.release/from components.findByName("release")/' "$PLUGIN"
          echo "✅ Patched ExpoModulesCorePlugin.gradle"

      # assembleRelease automatically bundles JS via Expo's export:embed command
      # and signs with the debug keystore (configured in build.gradle)
      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReserveBot-Android
          path: android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build iOS Simulator App
        working-directory: ios
        run: |
          xcodebuild \
            -workspace ReserveBot.xcworkspace \
            -scheme ReserveBot \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Package iOS App
        run: |
          cd ios/build/Build/Products/Release-iphonesimulator
          zip -r ../../../../../ReserveBot-iOS-Simulator.zip ReserveBot.app

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ReserveBot-iOS-Simulator
          path: ReserveBot-iOS-Simulator.zip
