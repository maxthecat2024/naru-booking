name: Pizza 4Ps Booking Agent

on:
  # Daily at 04:30 UTC = 10:00 AM IST
  schedule:
    - cron: '30 4 * * *'
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Ubuntu 24 compatible)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libxcomposite1 libxdamage1 libxfixes3 libxkbcommon0 libxrandr2 xvfb

      - name: Install Python deps + Playwright
        run: |
          pip install playwright==1.44.0
          playwright install chromium

      - name: Run booking agent
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BOOKING_FIRST_NAME: ${{ secrets.BOOKING_FIRST_NAME }}
          BOOKING_LAST_NAME:  ${{ secrets.BOOKING_LAST_NAME }}
          BOOKING_EMAIL:      ${{ secrets.BOOKING_EMAIL }}
          BOOKING_PHONE:      ${{ secrets.BOOKING_PHONE }}
        run: xvfb-run --auto-servernum python pizza4ps_book.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pizza4ps-${{ github.run_id }}
          path: |
            booking_result.png
            screenshots/
          retention-days: 7
          if-no-files-found: ignore
