name: Naru Booking Agent

on:
  # Runs every Monday at 14:25 UTC = 7:55 PM IST (5 min early to warm up)
  schedule:
    - cron: '30 2 * * 0'

  # Allow manual trigger from GitHub Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  book-naru:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fix Ubuntu 24 Playwright dependency
        run: |
          # Ubuntu 24 (Noble) renamed libasound2 → libasound2t64
          # Playwright's install-deps still references the old name, so we pre-install manually
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xvfb

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run booking agent
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BOOKING_NAME:  ${{ secrets.BOOKING_NAME }}
          BOOKING_EMAIL: ${{ secrets.BOOKING_EMAIL }}
          BOOKING_PHONE: ${{ secrets.BOOKING_PHONE }}
        run: python naru_book.py

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-screenshot-${{ github.run_id }}
          path: booking_result.png
          retention-days: 7
          if-no-files-found: ignore
